# Apache Virtual Host Configuration
# Place this in /etc/apache2/sites-available/event_system.conf
# Then: sudo a2ensite event_system && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/event_system

    # Enable rewrite engine
    <Directory /var/www/html/event_system>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # High concurrency settings (simulated)
    # These belong in mpm_prefork.conf or mpm_worker.conf
    # StartServers         5
    # MinSpareServers      5
    # MaxSpareServers     10
    # MaxRequestWorkers  150
    # MaxConnectionsPerChild 0

    # Enable keep-alive for performance
    KeepAlive On
    MaxKeepAliveRequests 100
    KeepAliveTimeout 5

    ErrorLog ${APACHE_LOG_DIR}/eventsys_error.log
    CustomLog ${APACHE_LOG_DIR}/eventsys_access.log combined
</VirtualHost>

# =============================================
# LOAD BALANCING EXPLANATION (Requirement #1)
# =============================================
# For high-traffic events, use mod_proxy_balancer:
#
# <Proxy "balancer://eventsys_cluster">
#     BalancerMember http://app1.internal:80 loadfactor=1
#     BalancerMember http://app2.internal:80 loadfactor=1
#     BalancerMember http://app3.internal:80 loadfactor=1
#     ProxySet lbmethod=byrequests
# </Proxy>
#
# ProxyPass "/" "balancer://eventsys_cluster/"
# ProxyPassReverse "/" "balancer://eventsys_cluster/"
#
# lbmethod options:
#   byrequests  - Round robin (equal distribution)
#   bytraffic   - Weighted by bandwidth
#   bybusyness  - Routes to least busy worker
#
# For sticky sessions (keep user on same server):
# ProxySet stickysession=PHPSESSID
#
# Benefit: During a flash sale or popular event launch,
# traffic is distributed across multiple servers so no
# single server becomes a bottleneck.
